services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: senzing
      POSTGRES_PASSWORD: senzing
      POSTGRES_DB: G2
    ports:
      - "5433:5432"
    volumes:
      - senzing_pg_data:/var/lib/postgresql/data

  # Local S3-compatible storage (MinIO). API :9000, web console :9001
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  senzing_pg_data:
  minio_data:
